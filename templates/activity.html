<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AntiSocial - Activity</title>
    <link rel="stylesheet" href="/static/css/style.css?v=24">
</head>
<body data-page="activity">
    <div class="page-shell">
        <header class="site-header">
            <div>
                <h1 class="brand">AntiSocial</h1>
                <p class="header-subtitle">Your comments, reactions, and saved posts.</p>
            </div>
            <nav class="top-nav">
                <a class="nav-link" href="/">Feed</a>
                <a class="nav-link" href="/create-post">Create post</a>
                <a class="nav-link" href="/saved">Saved</a>
                <a class="nav-link active" href="/activity">Activity</a>
                <a class="nav-link" href="/profile">Profile</a>
                <a class="nav-link" href="/settings">Settings</a>
                <a class="nav-link" href="/auth">Auth</a>
            </nav>
            <div class="header-actions">
                <span id="session-badge" class="session-badge">Guest mode</span>
                <button id="logout-button" class="ghost-button hidden" type="button">Log out</button>
            </div>
        </header>

        <main class="layout profile-layout">
            <section class="panel profile-posts-panel">
                <div class="card-head">
                    <div>
                        <h2>Your comments</h2>
                        <p class="section-subtitle">Recent comments you wrote.</p>
                    </div>
                </div>
                <div id="activity-comments-list" class="simple-list"></div>
            </section>

            <section class="panel">
                <div class="card-head">
                    <div>
                        <h2>Your reactions</h2>
                        <p class="section-subtitle">Latest reactions you left on posts.</p>
                    </div>
                </div>
                <div id="activity-reactions-list" class="simple-list"></div>
            </section>

            <section class="panel profile-posts-panel">
                <div class="card-head">
                    <div>
                        <h2>Saved posts</h2>
                        <p class="section-subtitle">Posts you bookmarked for later.</p>
                    </div>
                </div>
                <div id="activity-saved-posts-list" class="feed-list"></div>
            </section>
        </main>
    </div>

    <div id="message-box" class="message-box hidden"></div>
    <div id="post-modal" class="modal hidden">
        <div class="modal-backdrop" onclick="closePostModal()"></div>
        <div class="modal-card">
            <button class="modal-close" type="button" onclick="closePostModal()">Close</button>
            <div id="modal-content"></div>
        </div>
    </div>
    <script src="/static/js/app-loader.js?v=24"></script>
</body>
</html>
