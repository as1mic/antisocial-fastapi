<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AntiSocial - Settings</title>
    <link rel="stylesheet" href="/static/css/style.css?v=24">
</head>
<body data-page="settings">
    <div class="page-shell">
        <header class="site-header">
            <div>
                <h1 class="brand">AntiSocial</h1>
                <p class="header-subtitle">Account settings and password update.</p>
            </div>
            <nav class="top-nav">
                <a class="nav-link" href="/">Feed</a>
                <a class="nav-link" href="/create-post">Create post</a>
                <a class="nav-link" href="/saved">Saved</a>
                <a class="nav-link" href="/activity">Activity</a>
                <a class="nav-link" href="/profile">Profile</a>
                <a class="nav-link active" href="/settings">Settings</a>
                <a class="nav-link" href="/auth">Auth</a>
            </nav>
            <div class="header-actions">
                <span id="session-badge" class="session-badge">Guest mode</span>
                <button id="logout-button" class="ghost-button hidden" type="button">Log out</button>
            </div>
        </header>

        <main class="layout profile-layout">
            <section class="panel profile-panel">
                <div class="card-head">
                    <div>
                        <h2>Profile settings</h2>
                        <p class="section-subtitle">Update public account information.</p>
                    </div>
                </div>

                <form id="settings-profile-form" class="stack">
                    <label class="field">
                        <span>Username</span>
                        <input id="settings-username" type="text" required>
                    </label>
                    <label class="field">
                        <span>Email</span>
                        <input id="settings-email" type="email" required>
                    </label>
                    <label class="field">
                        <span>Bio</span>
                        <textarea id="settings-bio" rows="4"></textarea>
                    </label>
                    <div class="button-row">
                        <button class="primary-button" type="submit">Save profile</button>
                    </div>
                </form>
            </section>

            <section class="panel">
                <div class="card-head">
                    <div>
                        <h2>Password</h2>
                        <p class="section-subtitle">Change it with your current password.</p>
                    </div>
                </div>

                <form id="settings-password-form" class="stack">
                    <label class="field">
                        <span>Current password</span>
                        <input id="settings-current-password" type="password" required>
                    </label>
                    <label class="field">
                        <span>New password</span>
                        <input id="settings-new-password" type="password" minlength="6" required>
                    </label>
                    <div class="button-row">
                        <button class="primary-button" type="submit">Update password</button>
                    </div>
                </form>
            </section>

            <section class="panel">
                <div class="card-head">
                    <div>
                        <h2>Session</h2>
                        <p class="section-subtitle">Simple account actions.</p>
                    </div>
                </div>
                <div class="stack">
                    <a class="ghost-link-button" href="/profile">Back to profile</a>
                    <button id="settings-logout-button" class="ghost-button" type="button">Log out from this device</button>
                </div>
            </section>
        </main>
    </div>

    <div id="message-box" class="message-box hidden"></div>
    <script src="/static/js/app-loader.js?v=24"></script>
</body>
</html>
