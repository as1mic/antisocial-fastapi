<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AntiSocial - User</title>
    <link rel="stylesheet" href="/static/css/style.css?v=18">
</head>
<body data-page="user">
    <div class="page-shell">
        <header class="site-header">
            <div>
                <h1 class="brand">AntiSocial</h1>
                <p class="header-subtitle">Public profile, score, achievements, and posts.</p>
            </div>
            <nav class="top-nav">
                <a class="nav-link" href="/">Feed</a>
                <a class="nav-link" href="/create-post">Create post</a>
                <a class="nav-link" href="/profile">Profile</a>
                <a class="nav-link" href="/auth">Auth</a>
            </nav>
            <div class="header-actions">
                <span id="session-badge" class="session-badge">Guest mode</span>
                <button id="logout-button" class="ghost-button hidden" type="button">Log out</button>
            </div>
        </header>

        <main class="layout profile-layout">
            <section class="panel profile-panel">
                <div class="card-head">
                    <div>
                        <h2 id="view-user-name">User profile</h2>
                        <p class="section-subtitle">Public account details and stats.</p>
                    </div>
                    <div class="profile-actions-row">
                        <a class="ghost-link-button" href="/">Back to feed</a>
                        <button id="hate-follow-button" class="primary-button" type="button">Hate-follow</button>
                    </div>
                </div>

                <p id="view-user-bio" class="muted-text">Loading profile...</p>

                <div class="stats-grid">
                    <article>
                        <span class="stat-number" id="view-user-haters">0</span>
                        <span class="stat-label">Haters</span>
                    </article>
                    <article>
                        <span class="stat-number" id="view-user-posts-count">0</span>
                        <span class="stat-label">Posts</span>
                    </article>
                    <article>
                        <span class="stat-number" id="view-user-score">0</span>
                        <span class="stat-label">Score</span>
                    </article>
                </div>
            </section>

            <section class="panel">
                <div class="card-head">
                    <div>
                        <h2>Achievements</h2>
                        <p class="section-subtitle">Unlocked public milestones.</p>
                    </div>
                </div>
                <div id="achievement-list" class="simple-list"></div>
            </section>

            <section class="panel profile-posts-panel">
                <div class="card-head">
                    <div>
                        <h2>User posts</h2>
                        <p class="section-subtitle">Posts published by this user.</p>
                    </div>
                </div>
                <div id="user-posts-list" class="feed-list"></div>
            </section>
        </main>
    </div>

    <div id="message-box" class="message-box hidden"></div>
    <div id="post-modal" class="modal hidden">
        <div class="modal-backdrop" onclick="closePostModal()"></div>
        <div class="modal-card">
            <button class="modal-close" type="button" onclick="closePostModal()">Close</button>
            <div id="modal-content"></div>
        </div>
    </div>
    <script src="/static/js/main.js?v=18"></script>
</body>
</html>
